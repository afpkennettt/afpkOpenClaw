name: openclaw-secure

services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    user: "1000:1000"
    environment:
      HOME: /home/node
      TERM: xterm-256color
      NODE_OPTIONS: "--max-old-space-size=${OPENCLAW_NODE_MAX_OLD_SPACE_MB:-1024}"
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENCLAW_SKIP_CANVAS_HOST: "1"
      OPENCLAW_DISABLE_BONJOUR: "1"
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:?set-in-env-file}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
    volumes:
      - openclaw_home:/home/node
    ports:
      - "127.0.0.1:${OPENCLAW_GATEWAY_PORT:-18789}:18789"
    init: true
    restart: unless-stopped
    command:
      [
        "sh",
        "-lc",
        "umask 077 && mkdir -p /home/node/.openclaw/credentials /home/node/.openclaw/credentials/whatsapp && chmod 700 /home/node/.openclaw/credentials /home/node/.openclaw/credentials/whatsapp && if [ -d /home/node/.openclaw/credentials/whatsapp ]; then find /home/node/.openclaw/credentials/whatsapp -type d -exec chmod 700 {} + && find /home/node/.openclaw/credentials/whatsapp -type f -exec chmod 600 {} +; fi && exec node openclaw.mjs gateway --bind lan --port 18789",
      ]
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev
      - /run:rw,noexec,nosuid,nodev
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: ${OPENCLAW_MEM_LIMIT:-2g}
    cpus: ${OPENCLAW_CPUS:-2.0}
    ulimits:
      nofile:
        soft: 1024
        hard: 4096

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    user: "1000:1000"
    environment:
      HOME: /home/node
      TERM: xterm-256color
      BROWSER: echo
      NODE_OPTIONS: "--max-old-space-size=${OPENCLAW_NODE_MAX_OLD_SPACE_MB:-1024}"
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENCLAW_SKIP_CANVAS_HOST: "1"
      OPENCLAW_DISABLE_BONJOUR: "1"
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:?set-in-env-file}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
    volumes:
      - openclaw_home:/home/node
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "openclaw.mjs"]
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev
      - /run:rw,noexec,nosuid,nodev
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: ${OPENCLAW_CLI_MEM_LIMIT:-2g}
    cpus: ${OPENCLAW_CLI_CPUS:-1.0}
    ulimits:
      nofile:
        soft: 1024
        hard: 4096

volumes:
  openclaw_home:
    name: ${OPENCLAW_HOME_VOLUME:-openclaw_home_secure}
